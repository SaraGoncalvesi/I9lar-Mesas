<!doctype html>
<html lang="pt-br">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
   <link rel="stylesheet" href="./styles/cadastro.css" />
   <link rel="icon" href="/image/logo i9lar.png" type="image/png">
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   <title>Cadastro - I9lar</title>
</head>

<body>
   <header>
      <nav class="navbar navbar-dark bg-dark">
         <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
               <img src="./image/logoBilhar.jpeg" alt="Logo" width="40" class="me-2" />
               I9lar Mesas de Bilhar
            </a>

            <div class="d-flex align-items-center">
               <button class="navbar-toggler me-2" type="button" data-bs-toggle="offcanvas"
                  data-bs-target="#menuLateral">
                  <span class="navbar-toggler-icon"></span>
               </button>

               <form class="d-flex">
                  <input class="form-control me-2" type="search" placeholder="O que você procura?" />
                  <button class="btn btn-warning" type="submit">Procurar</button>
               </form>
            </div>
         </div>
      </nav>

      <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="menuLateral">
         <div class="offcanvas-header">
            <h5 class="offcanvas-title">Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
         </div>
         <div class="offcanvas-body">
            <ul class="navbar-nav">
               <li class="nav-item">
                  <a class="nav-link text-white" href="index.html">
                     <i class="bi bi-house"></i> Home
                  </a>
               </li>

               <li class="nav-item">
                  <a class="nav-link text-white" href="sobre.html">
                     <i class="bi bi-person"></i> Sobre
                  </a>
               </li>

               <li class="nav-item">
                  <a class="nav-link text-white" href="produtos.html">
                     <i class="bi bi-9-circle"></i> Produtos
                  </a>
               </li>

               <li class="nav-item">
                  <a class="nav-link text-white" href="contato.html">
                     <i class="bi bi-telephone"></i> Contato
                  </a>
               </li>

               <li class="nav-item">
                  <a class="nav-link text-white" href="login.html">
                     <i class="bi bi-person-fill"></i> Login
                  </a>
               </li>

               <li class="nav-item">
                  <a class="nav-link text-white" href="cadastro.html">
                     <i class="bi bi-person-fill-add"></i> Cadastro
                  </a>
               </li>
            </ul>
         </div>
      </div>
   </header>

   <main>
      <div>
         <h1>Cadastrar</h1>

         <section class="social">
            <a href="#" id="google">
               <img src="/image/google.png" class="img">
            </a>
            <a href="#" id="facebook">
               <img src="/image/facebook.png" class="img">
            </a>
            <a href="#" id="linkedin">
               <img src="/image/linkedin.png" class="img">
            </a>
         </section>

         <section class="colunas">
            <form class="colunaI">
               <div class="input-container">
                  <input type="text" id="Nome" class="input-field" placeholder="" />
                  <label for="Nome" class="input-label">Nome completo</label>
               </div>

               <div class="input-container">
                  <input type="text" id="Email" class="input-field" placeholder="" />
                  <label for="Email" class="input-label">Email</label>
               </div>

               <div class="input-container">
                  <input type="password" id="Senha" class="input-field" placeholder="" />
                  <label for="Senha" class="input-label">Senha</label>
               </div>

               <div class="input-container">
                  <input type="password" id="Confirmar" class="input-field" placeholder="" />
                  <label for="Confirmar" class="input-label">Confirmar senha</label>
               </div>
            </form>

            <form class="colunaII">
               <div class="input-container">
                  <input type="text" id="Telefone" class="input-field" placeholder="" />
                  <label for="Telefone" class="input-label">Telefone</label>
               </div>

               <div class="input-container">
                  <input type="date" id="Data" class="input-field" placeholder="" />
                  <label for="Data" class="input-label">Data de nascimento</label>
               </div>

               <div class="input-container">
                  <select id="cidade" class="input-field">
                     <option value="">Selecionar...</option>
                     <option>São Paulo</option>
                     <option>Campinas</option>
                     <option>Sumaré</option>
                     <option>Hortolândia</option>
                  </select>
                  <label for="Cidade" class="input-label">Cidade</label>
               </div>

               <div class="input-container">
                  <input type="text" id="Numero" class="input-field" placeholder="" />
                  <label for="Numero" class="input-label">Número da residência</label>
               </div>
            </form>
         </section>

         <div style="margin-top: 10px;">
            <input value="Entrar" type="submit" onclick="Funcao(); return false" class="input-field" style="width: 150px; height: 35px;">
         </div>

         <div class="login">
            <p style="padding-right: 8px;">Já tem uma conta?
               <a href="#">
                  <p>Entre</p>
               </a>
            </p>
         </div>

      </div>
   </main>

   <footer>
      <p>&copy; I9lar Mesas de Bilhar<br>CNPJ 54.887.300/0001-63</p>
   </footer>
</body>

</html>
